<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview Reels — {{ad_name}}</title>
<style>
body{margin:0;padding:2em;background:#000;display:flex;justify-content:center;font-family:-apple-system,sans-serif}
.reels{width:375px;height:812px;position:relative;overflow:hidden;background:url({{image_url}}) center/cover #111;border-radius:16px}
.overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold}
.username{font-weight:600;font-size:.95em}
.follow{margin-left:auto;padding:4px 12px;border:1px solid #fff;border-radius:4px;font-size:.8em}
.caption{font-size:.9em;line-height:1.4;margin-bottom:8px}
.cta{background:rgba(255,255,255,.95);color:#000;padding:10px;border-radius:6px;text-align:center;font-weight:600;margin-top:12px}
.sponsored{position:absolute;top:20px;left:20px;color:#fff;font-size:.8em;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:12px}
.side-actions{position:absolute;right:12px;bottom:140px;display:flex;flex-direction:column;gap:20px;color:#fff;text-align:center;font-size:.75em}
.action-icon{font-size:1.6em;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="reels">
<div class="sponsored">🔵 Reels · Patrocinado</div>
<div class="side-actions">
<div><span class="action-icon">❤️</span>Curtir</div>
<div><span class="action-icon">💬</span>Comentar</div>
<div><span class="action-icon">↗</span>Enviar</div>
</div>
<div class="overlay">
<div class="header">
<div class="avatar">{{page_initial}}</div>
<div class="username">@{{page_name}}</div>
<span class="follow">Seguir</span>
</div>
<div class="caption"><b>{{headline}}</b><br>{{primary_text}}</div>
<div class="cta">{{cta_label}} ›</div>
</div>
</div>
</body>
</html>
